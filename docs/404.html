<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SteelOx Redirect</title>
<script>
(function () {
  var p = window.location.pathname || "";
  if (/^\/steelox\/?/i.test(p)) {
    window.location.replace("/steelox/");
  }
})();
</script>
</head>
<body>

</main>
</body>
</html>
