name: SteelOx Cloud Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: steelox-cloud-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build SteelOx Cloud Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SteelOx Cloud Pages
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Ensure static artifact
        run: |
          mkdir -p public
          touch public/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy SteelOx Cloud Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
